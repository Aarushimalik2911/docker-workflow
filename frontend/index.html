<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Workflow</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: white;
            color: #333;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <h1>🚀 Docker Frontend Running</h1>
    <p>This is your DevOps practical project</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="msg"></p>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText = "Frontend is working perfectly 🎉";
        }
    </script>

</body>
</html>
